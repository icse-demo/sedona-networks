<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Create Account - Sedona Networks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="./favicon-32x32.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-signup">

    <!-- Signup form column (Company, Name, Email, clickwrap, Submit) -->
    <div class="signup-form-col">
        <div class="signup-header">
            <a href="index.html" class="signup-logo">
                <img src="assets/LogoFlat-Dark.svg" alt="">
            </a>
            <h1 class="signup-title">Create your free trial account.</h1>
            <p class="signup-sub">Join over 3,600 investors that are using Sedona to keep connected.</p>
        </div>
        <div class="signup-card">
            <h2 class="signup-card-title">Fill out the form below.</h2>
            <form class="signup-form">
                <div class="form-item">
                    <label for="signup-company">Company</label>
                    <div class="input-group">
                        <input id="signup-company" type="text" placeholder="Enter your company name">
                    </div>
                </div>
                <div class="form-item">
                    <label for="signup-fullname">Full Name</label>
                    <div class="input-group">
                        <input id="signup-fullname" type="text" placeholder="Enter your full name">
                    </div>
                </div>
                <div class="form-item">
                    <label for="signup-email">Email</label>
                    <div class="input-group">
                        <input id="signup-email" type="email" placeholder="Enter your email">
                    </div>
                </div>
                <div class="clickwrap-container">
                    <iframe id="my-iframe" src="https://demo.ironcladapp.com/clickwrap/698e55239f0b9d55d4bffdf0?jwt=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJmcmFtZUFuY2VzdG9ycyI6WyJodHRwczovL2ljc2UtZGVtby5naXRodWIuaW8iXSwiaWF0IjoxNzczOTQyMzI0fQ.hSpWXVvhJMco8Q-MyRV0DIkeHAnPsKFre68jCU_IgMY&parent=https://icse-demo.github.io" title="Terms and conditions"></iframe>
                    <svg viewBox="0 0 136 152" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M0 0.957442V15.2965C0 15.6948 0.398307 16.0931 0.796615 16.0931H59.7461V135.585H0.796615C0.398307 135.585 0 135.983 0 136.382V150.721C0 151.119 0.398307 151.517 0.796615 151.517H134.628C135.026 151.517 135.424 151.119 135.424 150.721V136.382C135.424 135.983 135.026 135.585 134.628 135.585H75.6784V16.0931H134.628C135.026 16.0931 135.424 15.6948 135.424 15.2965V0.957442C135.424 0.559135 135.026 0.160828 134.628 0.160828H0.796615C0.398307 0.160828 0 0.559135 0 0.957442ZM98.3816 34.0175H94.3992C94.0008 34.0175 93.6025 34.4158 93.6025 34.8141V116.865C93.6025 117.264 94.0008 117.662 94.3992 117.662H108.738C108.742 117.662 108.745 117.662 108.749 117.662H134.628C135.026 117.662 135.424 117.264 135.424 116.865V102.526C135.424 102.128 135.026 101.73 134.628 101.73H109.535V49.9498H134.628C135.026 49.9498 135.424 49.5515 135.424 49.1532V34.8141C135.424 34.4158 135.026 34.0175 134.628 34.0175H108.738H98.3816ZM37.0426 34.0175H41.0258C41.4241 34.0175 41.8224 34.4158 41.8224 34.8141V116.865C41.8224 117.264 41.4241 117.662 41.0258 117.662H26.6868L26.6763 117.662H0.796614C0.398307 117.662 0 117.264 0 116.865V102.526C0 102.128 0.398307 101.73 0.796614 101.73H25.8901V49.9498H0.796614C0.398307 49.9498 0 49.5515 0 49.1532V34.8141C0 34.4158 0.398307 34.0175 0.796614 34.0175H26.6868H37.0426Z" fill="#00CA88"/>
                    </svg>
                </div>
                <button type="button" class="btn-primary" id="btn-signup-submit" onclick="event.preventDefault(); displayClickwrap()">Submit</button>
            </form>
        </div>
    </div>

    <!-- Image column -->
    <div class="signup-image-col">
        <picture>
            <source type="image/webp" srcset="assets/City_Aerial_1City_Aerial.webp">
            <img
                class="signup-hero-img"
                src="assets/City_Aerial1552.jpg"
                width="1552"
                height="1035"
                alt="Aerial view of a connected city at dusk"
                loading="eager"
                decoding="async">
        </picture>
    </div>

    <!-- Ironclad: signature iframe and submit (used by script.js) -->
    <div id="iframe-container">
        <iframe id="signature-iframe" src="" title="Signature"></iframe>
        <button id="submit-button" disabled>Submit</button>
    </div>

    <!-- Loading overlay (shown during embedded signing) -->
    <div id="loading-container">
        <div class="loading-box">
            <div class="loader">
                <span></span><span></span><span></span>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <p id="loading-message"></p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
