<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Sign In - Sedona Networks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="./favicon-32x32.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="page-login">

    <!-- Image column -->
    <div class="login-image-col">
        <img
            class="login-hero-img"
            src="assets/SignIn2x.jpg"
            alt="Laptop on a desk showing network analytics dashboard"
            width="1600"
            height="1200"
            loading="eager"
            decoding="async">
    </div>

    <!-- Login form -->
    <div class="login-form-col">
        <div class="login-card">
            <div class="card-logo">
                <a href="index.html" class="login-header-logo">
                    <img src="assets/LogoFlat.svg" alt="">
                </a>
            </div>
            <h1 class="card-title">Sign into your account.</h1>
            <p class="card-sub">Join over 3,600 investors that are using Sedona to keep connected.</p>
            <form class="login-form">
                <div class="form-item">
                    <label for="login-email">Email Address</label>
                    <div class="input-group">
                        <input id="login-email" type="email" placeholder="Enter your email" required>
                    </div>
                </div>
                <div class="form-item">
                    <label for="login-password">Password</label>
                    <div class="input-group">
                        <input id="login-password" type="password" placeholder="*********" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Log In</button>
            </form>
            <p class="form-footer-links login-card-footer-links">
                <a href="signup.html">Create account</a>
            </p>
        </div>
    </div>

    <script src="js/site-ui.js"></script>
</body>
</html>
